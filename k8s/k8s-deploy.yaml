apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app-deployment
  labels:
    app: go-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
      - name: go-app
        image: ghcr.io/odominguezm/k8s-go-app:latest
        ports:
        - containerPort: 8080
        # LivenessProbe: Reinicia el contenedor si se queda "congelado"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        # ReadinessProbe: No le envía tráfico hasta que la app responda
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-app-service
spec:
  type: ClusterIP  # Cambiado de NodePort a ClusterIP para uso con Ingress
  selector:
    app: go-app
  ports:
    - protocol: TCP
      port: 80         # Puerto interno del servicio (donde apunta el Ingress)
      targetPort: 8080 # Puerto real de la aplicación dentro del contenedor
